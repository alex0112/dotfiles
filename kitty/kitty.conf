include ./seashells.conf
include ./fonts.conf

## Control appearance like window decorations, opacity, etc.
background_opacity 0.85
#background_opacity 0.95

hide_window_decorations yes

## Shell integrations (https://sw.kovidgoyal.net/kitty/shell-integration)
shell_integration enabled no-cursor

## Make the cursor pretty

# Cursor shape, color, thickness:
#cursor_shape [ block | beam | underline ]
cursor_shape underline
cursor_beam_thickness 10

# Set the cursor to have a trail behind it
cursor_trail 1
# cursor_trail_decay MIN MAX

#cursor_trail_decay 0.1 0.2
#cursor_trail_decay 0.4 0.8
cursor_trail_decay 0.3 0.7 

# only trail when jumping this number of cells
cursor_trail_start_threshold 8

## System bell custom file
# suit_denydevice.wav is from Valve's ource engine, found here: https://github.com/sourcesounds/hl2/blob/master/sound/player/suit_denydevice.wav
bell_path ~/.config/kitty/suit_denydevice.wav


